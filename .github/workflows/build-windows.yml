name: Build CsoundVST3 (Windows)

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  # 允许在 Action 面板手动触发工作流
  workflow_dispatch:

permissions:
  contents: write
  metadata: read

jobs:
  build-windows:
    name: Windows x64 Build
    # 你提供的环境信息兼容最新的 windows runner，使用 latest 将会采用带有 MSVC VS2022 的环境
    runs-on: windows-latest 
    
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive # 如果包含隐式子模块以策安全

      # ==============================================================
      # [核心前置依赖]: 你的 PowerShell 脚本强制要求 CSOUND_ROOT (Csound 7)
      # 由于 GitHub Action 每次环境是干净的，我们需要下载并解压一个 Csound 7 MSVC 包
      # ==============================================================
      - name: 2. Download and Setup Csound 7 (MSVC)
        shell: pwsh
        run: |
          # 🚨 警告: 请将这里的 URL 替换为你托管/发布好的 Csound 7 MSVC SDK 的下载链接
          # 因为目前 Csound 7 可能还没有提供固定可依赖的 msvc 最新预编译压缩包
          $CsoundZipUrl = "https://github.com/csound/csound/releases/download/7.0.0-beta.16/csound-windows-7.0.0-beta.16.zip" 
          $DownloadPath = "$env:RUNNER_TEMP\csound_msvc.zip"
          $CsoundInstallDir = "C:\Csound7"

          Write-Host "--> Downloading Csound SDK from: $CsoundZipUrl"
          Try {
              Invoke-WebRequest -Uri $CsoundZipUrl -OutFile $DownloadPath
          } Catch {
              Write-Warning "下载官方地址失败。如果您是私有分发版或暂无公开构建，请确保替换上面的 $CsoundZipUrl"
              # 阻断构建：因为 Csound 不存在，cmake 必将失败。如果您准备了静态压缩包存放在 repo，可修改为此处解压
              # exit 1 
          }

          if (Test-Path $DownloadPath) {
              Write-Host "--> Extracting Csound to $CsoundInstallDir ..."
              Expand-Archive -Path $DownloadPath -DestinationPath $CsoundInstallDir -Force
              
              # 给全局环境变量注入 CSOUND_ROOT 供 CsoundVST3 的 clean-build-windows.ps1 识别
              Write-Host "CSOUND_ROOT=$CsoundInstallDir" | Out-File -FilePath $env:GITHUB_ENV -Append
          } else {
              Write-Error "Csound SDK file was not downloaded. Check the URL!"
              exit 1
          }

      # ==============================================================
      # 构建主体，调用附件中现成的 PowerShell 编译逻辑
      # ==============================================================
      - name: 3. Compile and Archive CsoundVST3
        shell: pwsh
        working-directory: ./CsoundVST3
        run: |
          # 运行同级目录里的编译脚本 (带上 Release 级别提升编译后性能)
          Write-Host "Executing clean-build-windows.ps1 ..."
          .\clean-build-windows.ps1 -Config Release

      # ==============================================================
      # 将打包生成的二进制收集、存留并上传到 Artifact 供直接下载
      # 产出目录规则按照你脚本定义的 `$repoRoot\dist` 及其构建产生的压缩包
      # ==============================================================
      - name: 4. Upload Built Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CsoundVST3-Windows-Release
          path: |
            dist/
            build-windows/csound-vst3-*-windows.zip
          retention-days: 7 # 自动保留 7 天

      # ==============================================================
      # (可选) 当您在仓库里打 Tag (例如 v2.0.0) 的时候，自动发布到 Github Releases
      # ==============================================================
      - name: 5. Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build-windows/csound-vst3-*.zip
          draft: true  # 保存为草稿供开发者确认后公开
          generate_release_notes: true
