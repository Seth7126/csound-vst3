name: Windows x64 Build (VST3/Standalone)

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'CsoundVST3/**'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build on Windows
    # 指定与你们相似最新的Win版本预制件(windows-latest 当前一般指向最新版的2022及以上带C++的VS环境)
    runs-on: windows-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
        
    - name: Download and Setup Csound
      id: csound_install
      shell: powershell
      run: |
        $downloadUrl = "https://github.com/csound/csound/releases/download/7.0.0-beta.16/csound-windows-7.0.0-beta.16.zip"
        Write-Host "Downloading Csound from $downloadUrl"
        Invoke-WebRequest -Uri $downloadUrl -OutFile "csound.zip"
        
        Write-Host "Extracting installer archive..."
        Expand-Archive -Path "csound.zip" -DestinationPath "csound_extracted" -Force
        
        # 根据需求：往往这种打包ZIP解压出来可能带一个包含依赖或真正用于安装的环境EXE (一般用NSIS打包的安装文件)
        # 用Silent指令使其默认自动铺陈开(指定路径 /S 还有指定固定输出目标 /D)
        $installer = Get-ChildItem -Path csound_extracted -Filter *.exe -Recurse | Select-Object -First 1
        
        if ($installer) {
            Write-Host "Running Csound Installer quietly: $($installer.FullName)"
            Start-Process -FilePath $installer.FullName -ArgumentList "/S", "/D=C:\Csound" -Wait -NoNewWindow
        } else {
            # 如果这是一个绿色即开即用压缩版, 则通过路径迁移出内容
            Write-Host "No Exe installer found inside. Processing as portable setup..."
            $binFolder = Get-ChildItem -Path csound_extracted -Filter bin -Directory -Recurse | Select-Object -First 1
            $rootDir = $binFolder.Parent.FullName
            Move-Item -Path $rootDir -Destination "C:\Csound" -Force
        }
        
        # 核查并证明 Csound64 环境生效完毕
        if (Test-Path "C:\Csound\bin\csound.exe") {
            Write-Host "Csound verified at C:\Csound."
        } else {
            Throw "FATAL ERROR: Could not resolve 'C:\Csound\bin\csound.exe', aborting build!"
        }
        
    - name: Configure CMake
      # 这里我们将调用你们的 CsoundVST3 中的环境寻找机制完成依赖匹配 
      shell: powershell
      working-directory: ${{ github.workspace }}\CsoundVST3
      run: |
        # 丢掉原有ps1被旧式 VisualStudio HardCode 死绑的版本束缚限制。使用系统提供的内置默认发生器以兼容未来的Windows服务器(含VS2026/17+)
        $buildDir = "..\build-windows"
        $installDir = "..\dist"
        
        cmake -S . -B $buildDir -DCMAKE_BUILD_TYPE=Release `
            -A x64 `
            -DCMAKE_INSTALL_PREFIX=$installDir `
            -DCSOUND_ROOT_HINT="C:\Csound" `
            -DCSOUND_EXECUTABLE="C:\Csound\bin\csound.exe" `
            -DCSOUND_LIBRARY="C:\Csound\lib\csound64.lib" `
            -DCSOUND_LIBRARIES="C:\Csound\lib\csound64.lib"
            
    - name: Compile Plugins & Stage Distributions
      shell: powershell
      working-directory: ${{ github.workspace }}\CsoundVST3
      run: |
        $buildDir = "..\build-windows"
        # --parallel 参数使用自动加速进程并调用你在 CMake 预先打包的装配命令
        # target 指定编译 archive_dist 指令，进而递归连带上全部关联程序的编译阶段。
        cmake --build $buildDir --config Release --parallel --target archive_dist
        
    - name: Validate Output files in Dist
      shell: powershell
      run: |
        # 在控制台反馈已生成的产物详情
        Write-Host "Staged distriutions result:"
        Get-ChildItem -Path "dist" -Recurse | ForEach-Object { $_.FullName }
        
    - name: Upload Finished Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CsoundVST3_Windows_Plugin
        # 因为在 cmake 文件里最终目标名称带有 .zip 特性被放到 build 里（通常名叫 csound-vst3-...-windows.zip ），我们可以直接把 zip 与整份源dist输出提取交还
        path: |
          build-windows/*.zip
          dist/Standalone/*.exe
          dist/VST3 Plugins/**
