name: Windows x64 Build

on:
  push:
    branches: [ master, main, dev ]
  pull_request:
    branches: [ master, main, dev ]
  # 允许手动随时触发构建
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cache Csound 7 installation
        uses: actions/cache@v4
        id: cache-csound
        with:
          path: C:\Csound7
          # 如果CSound Beta更新了，可以通过改变 key 来强制重新下载：
          key: csound-windows-7.0.0-beta.16-x64

      - name: Download & Extract Csound
        # 缓存若未命中才下载（减少 20~50秒的 Action CI 执行时间）
        if: steps.cache-csound.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $Url = "https://github.com/csound/csound/releases/download/7.0.0-beta.16/csound-windows-7.0.0-beta.16.zip"
          $ZipPath = "$env:TEMP\csound-beta.zip"
          Write-Host "Start downloading Csound..."
          Invoke-WebRequest -Uri $Url -OutFile $ZipPath
          Write-Host "Extracting Csound..."
          # 指定解压目标文件夹，这对应后文里的环境配置
          Expand-Archive -Path $ZipPath -DestinationPath "C:\Csound7" -Force
          Write-Host "Csound deployed ready!"

      - name: Compile & Build CsoundVST3
        shell: pwsh
        env:
          # 提供具体的根目录（结合刚刚解压出的路径内嵌套目录层级进行配置）
          CSOUND_ROOT: C:\Csound7\csound-windows-7.0.0-beta.16
        run: |
          # 验证是否存在，方便遇到 Action CI 问题时的日志查错
          Test-Path "$env:CSOUND_ROOT\bin\csound.exe" -PathType Leaf
          
          cd CsoundVST3
          
          # 注意：你的 ps1 里面由于被固化硬编码为 `cmake -G "Visual Studio 17 2022" -A x64`
          # 最新 Runner Image Win-2025-vs2026 若对 17 拒认且失败的话，建议未来在 ps1 里将其摘掉。
          # 执行自动部署清库构建指令（此脚本附带创建 dist 存档ZIP的操作）
          .\clean-build-windows.ps1 -Config Release

      - name: Upload Finished CsoundVST3 Installer Zip
        uses: actions/upload-artifact@v4
        with:
          name: CsoundVST3-Windows-Archive
          # 因为生成结果名为 `csound-vst3-{ver}-windows.zip`
          path: build-windows/csound-vst3-*.zip

      - name: Upload Clean Binaries Extracted Folder
        uses: actions/upload-artifact@v4
        with:
          name: CsoundVST3-Windows-x64-Binaries
          # 为了你可以脱离 zip 直接测试查看内容布局，也额外提取这个构建完毕未压包的原生目录供 Action UI 下载使用
          path: dist/
